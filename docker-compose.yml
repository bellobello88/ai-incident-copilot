services:
  postgres:
    image: postgres:16
    container_name: ai-incident-postgres
    environment:
      POSTGRES_USER: incident_user
      POSTGRES_PASSWORD: incident_password
      POSTGRES_DB: incident_db
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U incident_user -d incident_db"]
      interval: 5s
      timeout: 5s
      retries: 5

  order-service:
    build:
      context: ./services/order-service
    container_name: ai-incident-order-service
    ports:
      - "8001:8000"
    environment:
      DATABASE_URL: postgresql://incident_user:incident_password@postgres:5432/incident_db
      USER_SERVICE_URL: http://user-service:8000
      INVENTORY_SERVICE_URL: http://inventory-service:8000
    depends_on:
      postgres:
        condition: service_healthy
      user-service:
        condition: service_started
      inventory-service:
        condition: service_started

  user-service:
    build:
      context: ./services/user-service
    container_name: ai-incident-user-service
    ports:
      - "8002:8000"
    environment:
      DATABASE_URL: postgresql://incident_user:incident_password@postgres:5432/incident_db
    depends_on:
      postgres:
        condition: service_healthy

  inventory-service:
    build:
      context: ./services/inventory-service
    container_name: ai-incident-inventory-service
    ports:
      - "8003:8000"
    environment:
      DATABASE_URL: postgresql://incident_user:incident_password@postgres:5432/incident_db
    depends_on:
      postgres:
        condition: service_healthy

volumes:
  postgres_data: