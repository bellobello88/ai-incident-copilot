services:
  postgres:
    image: postgres:16
    container_name: ai-incident-postgres
    environment:
      POSTGRES_USER: incident_user
      POSTGRES_PASSWORD: incident_password
      POSTGRES_DB: incident_db
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U incident_user -d incident_db"]
      interval: 5s
      timeout: 5s
      retries: 5

  order-service:
    build:
      context: ./services/order-service
    container_name: ai-incident-order-service
    ports:
      - "8001:8000"
    environment:
      DATABASE_URL: postgresql://incident_user:incident_password@postgres:5432/incident_db
      USER_SERVICE_URL: http://user-service:8000
      INVENTORY_SERVICE_URL: http://inventory-service:8000
    depends_on:
      postgres:
        condition: service_healthy
      user-service:
        condition: service_started
      inventory-service:
        condition: service_started

  user-service:
    build:
      context: ./services/user-service
    container_name: ai-incident-user-service
    ports:
      - "8002:8000"
    environment:
      DATABASE_URL: postgresql://incident_user:incident_password@postgres:5432/incident_db
    depends_on:
      postgres:
        condition: service_healthy

  inventory-service:
    build:
      context: ./services/inventory-service
    container_name: ai-incident-inventory-service
    ports:
      - "8003:8000"
    environment:
      DATABASE_URL: postgresql://incident_user:incident_password@postgres:5432/incident_db
    depends_on:
      postgres:
        condition: service_healthy

  prometheus:
    image: prom/prometheus:latest
    container_name: ai-incident-prometheus
    ports:
      - "9090:9090"
    volumes:
      - ./monitoring/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml
      - prometheus_data:/prometheus
    depends_on:
      - order-service
      - user-service
      - inventory-service
  grafana:
    image: grafana/grafana:latest
    container_name: ai-incident-grafana
    ports:
      - "3000:3000"
    environment:
      GF_SECURITY_ADMIN_USER: admin
      GF_SECURITY_ADMIN_PASSWORD: admin
    volumes:
      - grafana_data:/var/lib/grafana
      - ./monitoring/grafana/provisioning:/etc/grafana/provisioning
      - ./monitoring/grafana/dashboards:/var/lib/grafana/dashboards
    depends_on:
      - prometheus

  anomaly-detector:
    build:
      context: ./services/anomaly-detector
    container_name: ai-incident-anomaly-detector
    ports:
      - "8004:8000"
    environment:
      PROMETHEUS_URL: http://prometheus:9090
      DATABASE_URL: postgresql://incident_user:incident_password@postgres:5432/incident_db
      ERROR_COUNT_THRESHOLD: 1
      LATENCY_SECONDS_THRESHOLD: 1.0
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      OPENAI_MODEL: ${OPENAI_MODEL:-gpt-5.5}
    depends_on:
      postgres:
        condition: service_healthy
      prometheus:
        condition: service_started

  incident-dashboard:
    build:
      context: ./services/incident-dashboard
    container_name: ai-incident-dashboard
    ports:
      - "8501:8501"
    environment:
      ANOMALY_DETECTOR_URL: http://anomaly-detector:8000
      ORDER_SERVICE_URL: http://order-service:8000
      USER_SERVICE_URL: http://user-service:8000
      INVENTORY_SERVICE_URL: http://inventory-service:8000
    depends_on:
      - anomaly-detector

volumes:
  postgres_data:
  prometheus_data:
  grafana_data: