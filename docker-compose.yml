services:
  postgres:
    image: postgres:16
    container_name: ai-incident-postgres
    environment:
      POSTGRES_USER: incident_user
      POSTGRES_PASSWORD: incident_password
      POSTGRES_DB: incident_db
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U incident_user -d incident_db"]
      interval: 5s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  order-service:
    build:
      context: ./services/order-service
    container_name: ai-incident-order-service
    ports:
      - "8001:8000"
    environment:
      DATABASE_URL: postgresql://incident_user:incident_password@postgres:5432/incident_db
      USER_SERVICE_URL: http://user-service:8000
      INVENTORY_SERVICE_URL: http://inventory-service:8000
      OTEL_EXPORTER_OTLP_TRACES_ENDPOINT: http://jaeger:4318/v1/traces
      ENVIRONMENT: local
    depends_on:
      postgres:
        condition: service_healthy
      user-service:
        condition: service_started
      inventory-service:
        condition: service_started
      jaeger:
        condition: service_started
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python", "app/healthcheck.py"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s

  user-service:
    build:
      context: ./services/user-service
    container_name: ai-incident-user-service
    ports:
      - "8002:8000"
    environment:
      DATABASE_URL: postgresql://incident_user:incident_password@postgres:5432/incident_db
      OTEL_EXPORTER_OTLP_TRACES_ENDPOINT: http://jaeger:4318/v1/traces
      ENVIRONMENT: local
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python", "app/healthcheck.py"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s

  inventory-service:
    build:
      context: ./services/inventory-service
    container_name: ai-incident-inventory-service
    ports:
      - "8003:8000"
    environment:
      DATABASE_URL: postgresql://incident_user:incident_password@postgres:5432/incident_db
      OTEL_EXPORTER_OTLP_TRACES_ENDPOINT: http://jaeger:4318/v1/traces
      ENVIRONMENT: local
      
    depends_on:
      postgres:
        condition: service_healthy
      jaeger:
        condition: service_started
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python", "app/healthcheck.py"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s

  prometheus:
    image: prom/prometheus:latest
    container_name: ai-incident-prometheus
    ports:
      - "9090:9090"
    volumes:
      - ./monitoring/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml
      - ./monitoring/prometheus/alerts.yml:/etc/prometheus/alerts.yml
      - prometheus_data:/prometheus
    depends_on:
      - order-service
      - user-service
      - inventory-service
      - alertmanager
    restart: unless-stopped


  alertmanager:
    image: prom/alertmanager:latest
    container_name: ai-incident-alertmanager
    ports:
      - "9093:9093"
    volumes:
      - ./monitoring/alertmanager/alertmanager.yml:/etc/alertmanager/alertmanager.yml
      - alertmanager_data:/alertmanager
    restart: unless-stopped


  grafana:
    image: grafana/grafana:latest
    container_name: ai-incident-grafana
    ports:
      - "3000:3000"
    environment:
      GF_SECURITY_ADMIN_USER: admin
      GF_SECURITY_ADMIN_PASSWORD: admin
    volumes:
      - grafana_data:/var/lib/grafana
      - ./monitoring/grafana/provisioning:/etc/grafana/provisioning
      - ./monitoring/grafana/dashboards:/var/lib/grafana/dashboards
    depends_on:
      - prometheus
    restart: unless-stopped

  anomaly-detector:
    build:
      context: ./services/anomaly-detector
    container_name: ai-incident-anomaly-detector
    ports:
      - "8004:8000"
    environment:
      PROMETHEUS_URL: http://prometheus:9090
      DATABASE_URL: postgresql://incident_user:incident_password@postgres:5432/incident_db
      ERROR_COUNT_THRESHOLD: 1
      LATENCY_SECONDS_THRESHOLD: 1.0
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      OPENAI_MODEL: ${OPENAI_MODEL:-gpt-5.5}
      OTEL_EXPORTER_OTLP_TRACES_ENDPOINT: http://jaeger:4318/v1/traces
      ENVIRONMENT: local
    depends_on:
      postgres:
        condition: service_healthy
      prometheus:
        condition: service_started
      jaeger:
        condition: service_started
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python", "app/healthcheck.py"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s

  incident-dashboard:
    build:
      context: ./services/incident-dashboard
    container_name: ai-incident-dashboard
    ports:
      - "8501:8501"
    environment:
      ANOMALY_DETECTOR_URL: http://anomaly-detector:8000
      ORDER_SERVICE_URL: http://order-service:8000
      USER_SERVICE_URL: http://user-service:8000
      INVENTORY_SERVICE_URL: http://inventory-service:8000
      TRAFFIC_GENERATOR_URL: http://traffic-generator:8000
      OTEL_EXPORTER_OTLP_TRACES_ENDPOINT: http://jaeger:4318/v1/traces
      ENVIRONMENT: local
    depends_on:
      - anomaly-detector
      - traffic-generator
      - jaeger
  traffic-generator:
    build:
      context: ./services/traffic-generator
    container_name: ai-incident-traffic-generator
    ports:
      - "8005:8000"
    environment:
      ORDER_SERVICE_URL: http://order-service:8000
      USER_SERVICE_URL: http://user-service:8000
      INVENTORY_SERVICE_URL: http://inventory-service:8000
      OTEL_EXPORTER_OTLP_TRACES_ENDPOINT: http://jaeger:4318/v1/traces
      ENVIRONMENT: local
    depends_on:
      - order-service
      - user-service
      - inventory-service
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python", "app/healthcheck.py"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s
      

  jaeger:
    image: jaegertracing/all-in-one:latest
    container_name: ai-incident-jaeger
    ports:
      - "16686:16686"
      - "4318:4318"
    environment:
      COLLECTOR_OTLP_ENABLED: "true"
    restart: unless-stopped

volumes:
  postgres_data:
  prometheus_data:
  grafana_data:
  alertmanager_data: